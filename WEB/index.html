<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система тестирования</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<button id="theme-toggle" class="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="container">
    
    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div id="auth-view">
        <h1>Вход / Регистрация</h1>
        <div class="auth-hint">
            Для проверки:<br>
            Преподаватель: логин <b>teacher</b>, пароль <b>123</b><br>
            Студент: логин <b>student</b>, пароль <b>123</b>
        </div>
        
        <input type="text" id="login-username" placeholder="Логин">
        <input type="password" id="login-password" placeholder="Пароль">
        
        <div class="reg-fields-hint">Заполните поля ниже только для регистрации:</div>
        <input type="text" id="login-firstname" placeholder="Имя">
        <input type="text" id="login-lastname" placeholder="Фамилия">
        
        <select id="login-role" class="role-select">
            <option value="student">Студент</option>
            <option value="teacher">Преподаватель</option>
        </select>
        
        <button onclick="login()">Войти</button>
        <button class="secondary" onclick="register()">Зарегистрироваться</button>
    </div>

    <!-- ШАПКА ДЛЯ АВТОРИЗОВАННЫХ -->
    <div id="header-view" class="header hidden">
        <div>
            <span id="user-info" class="user-info-text"></span>
        </div>
        <button class="secondary btn-logout" onclick="logout()">Выйти</button>
    </div>

    <!-- ЭКРАН ПРЕПОДАВАТЕЛЯ -->
    <div id="teacher-view" class="hidden">
        <h2>Панель преподавателя</h2>
        <div class="teacher-header">
            <h3>Созданные тесты:</h3>
            <button class="btn-create" onclick="showCreateTestForm()">+ Создать тест</button>
        </div>
        <div id="teacher-tests-list"></div>

        <!-- Форма создания теста -->
        <div id="create-test-form" class="hidden create-form">
            <h3>Новый тест</h3>
            <input type="text" id="new-test-title" placeholder="Название теста">
            
            <!-- БЛОК ВЫБОРА СТУДЕНТОВ -->
            <div class="access-control-box">
                <h4>Кому доступен тест:</h4>
                <div class="radio-group">
                    <label><input type="radio" name="access_type" value="all" checked onchange="toggleStudentList()"> Всем студентам</label>
                    <label><input type="radio" name="access_type" value="selected" onchange="toggleStudentList()"> Выбрать из списка</label>
                </div>
                <div id="student-checkbox-list" class="student-list hidden">
                    <!-- Сюда JS вставит список студентов с чекбоксами -->
                </div>
            </div>
            
            <div id="questions-container"></div>
            <button class="secondary" onclick="addQuestionUI()">+ Добавить вопрос</button>
            <button class="btn-success" onclick="saveTest()">Сохранить тест</button>
            <button class="secondary" onclick="hideCreateTestForm()">Отмена</button>
        </div>

        <!-- Статистика -->
        <div id="stats-view" class="hidden stats-container">
            <h3 id="stats-title">Статистика</h3>
            <div class="chart-container">
                <canvas id="statsChart"></canvas>
            </div>
            <div id="stats-students-list" class="stats-list"></div>
            
            <button class="secondary" onclick="document.getElementById('stats-view').classList.add('hidden')">Закрыть статистику</button>
        </div>
    </div>

    <!-- ЭКРАН СТУДЕНТА -->
    <div id="student-view" class="hidden">
        <h2>Доступные тесты</h2>
        <div id="student-tests-list"></div>
    </div>

    <!-- ПРОХОЖДЕНИЕ ТЕСТА -->
    <div id="take-test-view" class="hidden">
        <h2 id="take-test-title"></h2>
        <div id="take-test-container"></div>
        <button class="btn-success" onclick="submitTest()">Завершить тест</button>
        <button class="secondary" onclick="cancelTest()">Отмена</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
