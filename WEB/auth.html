<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>
<button id="theme-toggle" class="theme-btn" onclick="toggleTheme()">🌙</button>
<div class="container">
    <h1>Вход / Регистрация</h1>
    <input type="text" id="username" placeholder="Логин">
    <input type="password" id="password" placeholder="Пароль">
    <div style="font-size:0.9em; opacity:0.7; text-align:center; margin-top:10px;">Для регистрации:</div>
    <input type="text" id="firstname" placeholder="Имя">
    <input type="text" id="lastname" placeholder="Фамилия">
    <select id="role">
        <option value="student">Студент</option>
        <option value="teacher">Преподаватель</option>
    </select>
    <button onclick="login()">Войти</button>
    <button class="secondary" onclick="register()">Зарегистрироваться</button>
</div>
<script src="static/js/api.js"></script>
<script src="static/js/auth.js"></script>
</body>
</html>
