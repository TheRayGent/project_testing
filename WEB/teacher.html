<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель Преподавателя</title>
    <link rel="stylesheet" href="static/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<button id="theme-toggle" class="theme-btn" onclick="toggleTheme()">🌙</button>
<div class="container">
    <div class="header">
        <span id="user-info" class="user-info-text">Загрузка...</span>
        <button class="secondary" style="width:auto; margin:0;" onclick="logout()">Выйти</button>
    </div>

    <h2>Панель преподавателя</h2>
    <div style="display:flex; justify-content:space-between;">
        <h3>Ваши тесты:</h3>
        <button class="btn-success" style="width:auto;" onclick="showCreateForm()">+ Создать</button>
    </div>
    
    <div id="tests-list"></div>

    <div id="create-form" class="hidden" style="margin-top:20px; border-top:1px solid #ddd; padding-top:20px;">
        <h3>Новый тест</h3>
        <input type="text" id="test-title" placeholder="Название">
        <input type="text" id="test-allowed" placeholder="Кому доступен (логины через запятую, пусто = всем)">
        <div id="questions-container"></div>
        <button class="secondary" onclick="addQuestion()">+ Добавить вопрос</button>
        <button class="btn-success" onclick="saveTest()">Сохранить тест</button>
    </div>
</div>
<script src="static/js/api.js"></script>
<script src="static/js/teacher.js"></script>
</body>
</html>
